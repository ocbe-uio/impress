datasets:
  ADSL:
    structure: "SPECIAL-PURPOSE"
    keys: ["USUBJID"]

    # -------------------------
    # Variable lineage (CDASH -> ADaM)
    # -------------------------
    variables:
      # --- Identifiers ---
      - name: STUDYID
        label: "Study Identifier"
        type: char
        length: 20
        origin: Assigned
        derivation: "cfg$studyid"

      - name: DIAGNOSIS
        label: "Diagnosis"
        type: char
        length: 50
        origin: Collected
        sources:
          - { id: "sitename", dataset: "DM" }         # <- Items.csv id + dataset

      - name: SUBJID
        label: "Subject Identifier for Study"
        type: char
        length: 24
        origin: Collected
        sources:
          - { id: "subjectid", dataset: "DM" }

      - name: USUBJID
        label: "Unique Subject Identifier"
        type: char
        length: 36
        origin: Derived
        derivation: "paste(STUDYID, '-', SUBJID)"
        sources:
          - { id: "subjectid", dataset: "DM" }
          - { id: "sitename", dataset: "DM" }

      - name: COUNTRY
        label: "Country (ISO3)"
        type: char
        length: 3
        origin: Assigned
        derivation: "cfg$country_code"

      # --- Demography / baseline covariates ---
      - name: AGE
        label: "Age at Baseline"
        type: num
        origin: Collected
        sources:
          - { id: "dmage", dataset: "DM" }

      - name: SEX
        label: "Sex"
        type: char
        length: 1
        origin: Collected
        codelist: SEX
        sources:
          - { id: "sex", dataset: "DM" }

      - name: RANDDT
        label: "Date of Randomization"
        type: date
        origin: Collected
        sources:
          - { id: "randat", dataset: "RAN" }

      - name: RFSTDT
        label: "First Study Treatment Date"
        type: date
        origin: Derived
        derivation: "RFSTDT_EVT" # From date of Cycle 1

     # --- Planned treatment at baseline (randomization #1) ---
      - name: STEP
        label: "Planned Start-up Step (Stepped-Wedge)"
        type: char
        length: 25
        origin: Collected
        sources:
          - { id: "ranst", dataset: "RAN" }   # from randomization module

      - name: DOSE01P
        label: "Planned First Dose (mg)"
        type: num
        origin: Derived
        derivation: "str_remove(randos, 'mg') %>% as.numeric()"
        sources:
          - { id: "randos", dataset: "RAN" }
     
      - name: DOSE01PU
        label: "Planned First Dose Unit"
        type: char
        length: 2
        origin: Assigned
        derivation: "'mg'"
        
      - name: TRT01P
        label: "Planned First Treatment"
        type: char
        length: 50
        origin: Derived
        derivation: "paste0('Losartan ', DOSE01P, ' mg; Step ', STEP)"     

      - name: DOSE02P
        label: "Planned Extended Dose (mg)"
        type: num
        origin: Derived
        derivation: "if_else(is.na(ranfudos), ' ', str_remove(ranfudos, 'mg')) %>% as.numeric()"
        sources:
          - { id: "ranfudos", dataset: "RAN" }
     
      - name: DOSE02PU
        label: "Planned Extended Dose Unit"
        type: char
        length: 2
        origin: Assigned
        derivation: "'mg'"
        
      - name: TRT02P
        label: "Planned Extended Treatment"
        type: char
        length: 50
        origin: Derived
        derivation: "paste0('Losartan ', DOSE02P, ' mg')"      
          
      - name: ARM
        label: "Planned Arm"
        type: char
        length: 80
        origin: Derived
        derivation: "paste0('Losartan ', DOSE01P, ' mg; Step ', STEP, ' > Losartan ', DOSE02P, ' mg')"

      - name: ARMCD
        label: "Planned Arm Code"
        type: char
        length: 12
        origin: Derived
        derivation: "paste0(rantrt, if_else(str_starts(rantrt, 'A'), paste0('_', DOSE02P), ''))"
        sources:
          - { id: "rantrt", dataset: "RAN" }
    # -------------------------
    # Value-level metadata (ADSL rarely needs it; left empty intentionally)
    # -------------------------
    value_level: []
 
  ADEFF:
    structure: "BDS"
    keys: ["USUBJID","PARAMCD","AVISIT"]

    variables:
      - name: STUDYID
        label: "Study Identifier"
        type: char
        length: 20
        origin: Assigned
        derivation: "cfg$studyid"

      - name: USUBJID
        type: char
        origin: Collected
        sources:
          - { id: "USUBJID", dataset: "ADSL" }

      # --- Timing ---
      - name: EVENTNAME
        type: char
        length: 60
        origin: Collected
        sources:
          - { id: "eventname", dataset: "RS" }
        intermediate: true

      - name: AVISIT
        type: char
        length: 40
        origin: Derived
        derivation: "lookup_avisit(EVENTNAME)"

      - name: AVISITN
        type: num
        origin: Derived
        derivation: "lookup_avisitn(EVENTNAME)"

      - name: ADT
        type: date
        origin: Collected
        sources:
          - { id: "mridat", dataset: "RS" }

      - name: RFSTDT
        type: date
        origin: Derived
        sources:
          - { id: "RFSTDT", dataset: "ADSL" }
        intermediate: true

      - name: ADY
        type: num
        origin: Derived
        derivation: "as.numeric(ADT - RFSTDT)"

    #   # --- Parameter scaffold ---
    #   - { name: PARAMCD, type: char, length: 8, origin: Collected, sources: [ {id: "paramcd", dataset: "RS"} ] }
    #   - { name: PARAM,   type: char, length: 40, origin: Collected, sources: [ {id: "param", dataset: "RS"} ] }
    #   - { name: AVAL,    type: num, origin: Collected, sources: [ {id: "aval", dataset: "RS"} ] }

