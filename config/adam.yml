    #   - { name: PCHG,  type: num, origin: Derived, derivation: "100 * (AVAL - BASE) / BASE" }

    #   - { name: ANL01FL, type: char, length: 1, origin: Derived, derivation: "ifelse(!is.na(AVAL), 'Y','N')" }

